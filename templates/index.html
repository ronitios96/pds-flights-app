<!DOCTYPE html>
<html>
<head>
    <title>Flight Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
        }
        h1 { color: #333; }
        form {
            background: #f5f5f5;
            padding: 25px;
            border-radius: 8px;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            margin-top: 20px;
            padding: 10px 30px;
            background: #57068c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #3d0463; }
    </style>
</head>
<body>
    <h1>Flight Search</h1>
    <form method="POST" action="/">
        <label for="origin">Origin Airport Code</label>
        <input type="text" id="origin" name="origin" placeholder="e.g. JFK" required maxlength="3">

        <label for="dest">Destination Airport Code</label>
        <input type="text" id="dest" name="dest" placeholder="e.g. LAX" required maxlength="3">

        <label for="start_date">From Date</label>
        <input type="date" id="start_date" name="start_date" required>

        <label for="end_date">To Date</label>
        <input type="date" id="end_date" name="end_date" required>

        <button type="submit">Search Flights</button>
    </form>
</body>
</html>
